version: '3.8'

services:
  # 前端 + Nginx
  web:
    build: .
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/var/www/invoice-harvester/index.html:ro
    restart: unless-stopped
    depends_on:
      - api

